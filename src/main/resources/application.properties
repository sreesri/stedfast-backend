spring.application.name=stedfast
# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stedfast}
spring.datasource.username=${DB_USER:stedfast}
spring.datasource.password=${DB_PASSWORD:stedfast}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP Connection Pool (tuned for Aiven free tier + Render)
# Aiven free-tier Postgres hard-caps at 5 total connections.
# Pool = 3 leaves 2 free for Liquibase migrations and health checks.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
# Wait up to 20 s for a free connection before failing (render cold-start)
spring.datasource.hikari.connection-timeout=20000
# Evict idle connections after 3 min to avoid Aiven/Render network drops
spring.datasource.hikari.idle-timeout=180000
# Force-recycle every 10 min — well under any provider TCP idle limit
spring.datasource.hikari.max-lifetime=600000
# Keepalive ping every 60 s prevents silent connection drops
spring.datasource.hikari.keepalive-time=60000
# Validate the connection is live before using it
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=HikariPool-Stedfast
# SSL is mandatory for Aiven Postgres
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
# Spring Security config
stedfast.jwt.secret=${AUTH_SECRET}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# Docker Compose (disabled in production)
# spring.docker.compose.enabled=true
# Actuator Endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
